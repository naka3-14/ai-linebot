<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIマルチエージェント討論</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 2rem; }
    h1 { text-align: center; margin-bottom: 1.5rem; font-size: 1.4rem; color: #333; }
    .input-area { display: flex; gap: 8px; max-width: 600px; margin: 0 auto 2rem; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    button { padding: 10px 20px; background: #5c5bd4; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4a49b8; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .section { max-width: 800px; margin: 0 auto 1.5rem; }
    .section-title { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: bold; }
    .card { background: white; border-radius: 12px; padding: 1.2rem; border: 1px solid #eee; margin-bottom: 8px; }
    .card.orchestrator { border-top: 3px solid #7c7cd4; }
    .card.pro { border-left: 4px solid #1D9E75; }
    .card.con { border-left: 4px solid #D85A30; }
    .card.verdict { border-top: 3px solid #7c7cd4; }
    .card-label { font-size: 12px; font-weight: bold; margin-bottom: 6px; }
    .card.orchestrator .card-label { color: #5c5bd4; }
    .card.pro .card-label { color: #1D9E75; }
    .card.con .card-label { color: #D85A30; }
    .card.verdict .card-label { color: #5c5bd4; }
    .card-text { font-size: 14px; line-height: 1.7; color: #333; }
    .round-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .loading { text-align: center; color: #888; margin: 2rem; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>AIマルチエージェント討論（3ラウンド）</h1>
  <div class="input-area">
    <input type="text" id="topicInput" placeholder="例：AIは人間の仕事を奪うか" value="AIは人間の仕事を奪うか" />
    <button id="startBtn" onclick="startDebate()">討論スタート</button>
  </div>

  <div id="loading" class="loading hidden">AIたちが3ラウンド討論中...少々お待ちください</div>
  <div id="result" class="hidden">
    <div class="section">
      <div class="card orchestrator">
        <div class="card-label">司令塔 AI（議論設定）</div>
        <div class="card-text" id="setup"></div>
      </div>
    </div>
    <div id="rounds"></div>
    <div class="section">
      <div class="card verdict">
        <div class="card-label">司令塔 AI（最終総括）</div>
        <div class="card-text" id="verdict"></div>
      </div>
    </div>
  </div>

  <script>
    async function startDebate() {
      const topic = document.getElementById("topicInput").value.trim();
      if (!topic) return;
      const btn = document.getElementById("startBtn");
      btn.disabled = true;
      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("rounds").innerHTML = "";

      try {
        const res = await fetch("/debate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic })
        });
        const data = await res.json();

        document.getElementById("setup").textContent = data.setup;

        data.rounds.forEach(r => {
          const section = document.createElement("div");
          section.className = "section";
          section.innerHTML = `
            <div class="section-title">ラウンド ${r.round}</div>
            <div class="round-cards">
              <div class="card pro">
                <div class="card-label">賛成エージェント</div>
                <div class="card-text">${r.pro}</div>
              </div>
              <div class="card con">
                <div class="card-label">反対エージェント</div>
                <div class="card-text">${r.con}</div>
              </div>
            </div>
          `;
          document.getElementById("rounds").appendChild(section);
        });

        document.getElementById("verdict").textContent = data.verdict;
        document.getElementById("result").classList.remove("hidden");
      } catch (e) {
        alert("エラー：" + e.message);
      }
      document.getElementById("loading").classList.add("hidden");
      btn.disabled = false;
    }
  </script>
</body>
</html>
